{% extends "base.html" %}
{% load static %}

{% block title %}Proveedores{% endblock %}

{% block content %}
<div class="space-y-6">
    <!-- Header -->
    <div class="md:flex items-center justify-between gap-4">
        <div>
            <h1 class="text-3xl font-bold text-slate-900 dark:text-slate-100">📋 Proveedores</h1>
            <p class="text-sm text-slate-500 dark:text-slate-400 mt-1">Gestión de proveedores (ISO 8.4)</p>
        </div>
        {% if can_edit %}
        <a href="{% url 'core:supplier_new' %}" class="btn btn-success">➕ Nuevo Proveedor</a>
        {% endif %}
    </div>

    <!-- Filters Card -->
    <form method="get" class="bg-white dark:bg-slate-800/50 border border-slate-200 dark:border-white/10 rounded-xl p-6 shadow-sm" hx-get="{% url 'core:supplier_list' %}" hx-target="#results" hx-push-url="true" hx-trigger="change delay:300ms, submit">
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 items-end">
            <div>
                <label for="status-filter" class="block text-xs uppercase tracking-wider font-semibold text-slate-700 dark:text-slate-300 mb-2">Estado</label>
                <select class="w-full rounded-lg border border-slate-300 dark:border-white/10 bg-white dark:bg-slate-900/50 px-3 py-2 text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all" id="status-filter" name="status">
                    <option value="">Todos</option>
                    {% for value, label in status_choices %}
                    <option value="{{ value }}" {% if value == selected_status %}selected{% endif %}>{{ label }}</option>
                    {% endfor %}
                </select>
            </div>
            <div>
                <label for="category-filter" class="block text-xs uppercase tracking-wider font-semibold text-slate-700 dark:text-slate-300 mb-2">Categoría</label>
                <select class="w-full rounded-lg border border-slate-300 dark:border-white/10 bg-white dark:bg-slate-900/50 px-3 py-2 text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all" id="category-filter" name="category">
                    <option value="">Todas</option>
                    {% for value, label in category_choices %}
                    <option value="{{ value }}" {% if value == selected_category %}selected{% endif %}>{{ label }}</option>
                    {% endfor %}
                </select>
            </div>
            <div>
                <label for="process-filter" class="block text-xs uppercase tracking-wider font-semibold text-slate-700 dark:text-slate-300 mb-2">Proceso</label>
                <select class="w-full rounded-lg border border-slate-300 dark:border-white/10 bg-white dark:bg-slate-900/50 px-3 py-2 text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all" id="process-filter" name="process">
                    <option value="">Todos</option>
                    {% for process in processes %}
                    <option value="{{ process.id }}" {% if process.id|stringformat:"s" == selected_process %}selected{% endif %}>{{ process.name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="flex gap-2">
                <a class="btn btn-secondary btn-sm" href="{% url 'core:supplier_list' %}">Limpiar</a>
            </div>
        </div>
    </form>

    <!-- Results -->
    <div id="results">
        {% include "core/suppliers/_list_results.html" %}
    </div>
</div>
{% endblock %}
