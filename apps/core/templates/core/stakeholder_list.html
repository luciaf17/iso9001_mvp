{% extends "base.html" %}

{% block title %}Partes Interesadas{% endblock %}

{% block content %}
<div class="space-y-6">
    <!-- Header -->
    <div class="flex flex-col md:flex-row items-start md:items-center justify-between gap-4">
        <div>
            <h1 class="text-3xl font-bold text-slate-900 dark:text-white">🤝 Partes Interesadas</h1>
            <p class="text-sm text-slate-500 dark:text-slate-400 mt-1">Organizacion: {{ organization.name }}</p>
        </div>
        {% if can_edit %}
        <a class="btn btn-success whitespace-nowrap" href="{% url 'core:stakeholder_new' %}">+ Nueva Parte</a>
        {% endif %}
    </div>

    <!-- Filters -->
    <form method="get" class="bg-white dark:bg-slate-800/50 border border-slate-200 dark:border-white/10 rounded-xl p-6 shadow-sm" hx-get="{% url 'core:stakeholder_list' %}" hx-target="#results" hx-push-url="true" hx-trigger="change delay:300ms, keyup changed delay:300ms from:#search, submit">
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 items-end">
            <div>
                <label for="search" class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2">🔍 Buscar</label>
                <input type="text" id="search" name="search" value="{{ selected_search }}" placeholder="Nombre..." class="w-full rounded-lg border border-slate-300 dark:border-white/10 bg-white dark:bg-slate-900/50 px-3 py-2 text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-blue-500">
            </div>
            <div>
                <label for="stakeholder_type" class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2">📋 Tipo</label>
                <select id="stakeholder_type" name="stakeholder_type" class="w-full rounded-lg border border-slate-300 dark:border-white/10 bg-white dark:bg-slate-900/50 px-3 py-2 text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-blue-500">
                    <option value="">Todos</option>
                    {% for value, label in stakeholder_types %}
                    <option value="{{ value }}" {% if selected_type == value %}selected{% endif %}>{{ label }}</option>
                    {% endfor %}
                </select>
            </div>
            <div>
                <label for="process_id" class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2">🔗 Proceso</label>
                <select id="process_id" name="process_id" class="w-full rounded-lg border border-slate-300 dark:border-white/10 bg-white dark:bg-slate-900/50 px-3 py-2 text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-blue-500">
                    <option value="">Todos</option>
                    {% for process in processes %}
                    <option value="{{ process.id }}" {% if selected_process_id == process.id|stringformat:"s" %}selected{% endif %}>{{ process }}</option>
                    {% endfor %}
                </select>
            </div>
            <div>
                <label for="is_active" class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2">✅ Estado</label>
                <select id="is_active" name="is_active" class="w-full rounded-lg border border-slate-300 dark:border-white/10 bg-white dark:bg-slate-900/50 px-3 py-2 text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-blue-500">
                    <option value="">Todos</option>
                    <option value="true" {% if selected_is_active == "true" %}selected{% endif %}>Activos</option>
                    <option value="false" {% if selected_is_active == "false" %}selected{% endif %}>Inactivos</option>
                </select>
            </div>
            <div class="md:col-span-2 lg:col-span-4 flex justify-end">
                <a class="btn btn-secondary" href="{% url 'core:stakeholder_list' %}">Limpiar Filtros</a>
            </div>
        </div>
    </form>

    <!-- Results -->
    <div id="results">
        {% include "core/stakeholders/_list_results.html" %}
    </div>
</div>
{% endblock %}
