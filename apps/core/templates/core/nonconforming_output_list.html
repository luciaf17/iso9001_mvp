{% extends "base.html" %}

{% block title %}Productos/Servicios No Conformes{% endblock %}

{% block content %}
<div class="space-y-6">
    <!-- Header -->
    <div class="flex flex-col md:flex-row items-start md:items-center justify-between gap-4">
        <h1 class="text-3xl font-bold text-slate-900 dark:text-white">🔴 Productos/Servicios No Conformes</h1>
        {% if can_edit %}
        <a href="{% url 'core:nonconforming_output_new' %}" class="btn-primary whitespace-nowrap">➕ Nuevo PNC</a>
        {% endif %}
    </div>

    <!-- Filters -->
    <form method="get" class="bg-white dark:bg-slate-800/50 border border-slate-200 dark:border-white/10 rounded-xl p-6 shadow-sm" hx-get="{% url 'core:nonconforming_output_list' %}" hx-target="#results" hx-push-url="true" hx-trigger="change delay:300ms, submit">
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 items-end">
            <div>
                <label for="status-filter" class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2">Estado</label>
                <select id="status-filter" name="status" class="w-full rounded-lg border border-slate-300 dark:border-white/10 bg-white dark:bg-slate-900/50 px-3 py-2 text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-blue-500">
                    <option value="">Todos</option>
                    <option value="OPEN" {% if selected_status == 'OPEN' %}selected{% endif %}>Abierta</option>
                    <option value="IN_TREATMENT" {% if selected_status == 'IN_TREATMENT' %}selected{% endif %}>En tratamiento</option>
                    <option value="CLOSED" {% if selected_status == 'CLOSED' %}selected{% endif %}>Cerrada</option>
                </select>
            </div>
            <div>
                <label for="severity-filter" class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2">Severidad</label>
                <select id="severity-filter" name="severity" class="w-full rounded-lg border border-slate-300 dark:border-white/10 bg-white dark:bg-slate-900/50 px-3 py-2 text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-blue-500">
                    <option value="">Todos</option>
                    <option value="MINOR" {% if selected_severity == 'MINOR' %}selected{% endif %}>Menor</option>
                    <option value="MAJOR" {% if selected_severity == 'MAJOR' %}selected{% endif %}>Mayor</option>
                    <option value="CRITICAL" {% if selected_severity == 'CRITICAL' %}selected{% endif %}>Crítica</option>
                </select>
            </div>
            <div>
                <label for="disposition-filter" class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2">Disposición</label>
                <select id="disposition-filter" name="disposition" class="w-full rounded-lg border border-slate-300 dark:border-white/10 bg-white dark:bg-slate-900/50 px-3 py-2 text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-blue-500">
                    <option value="">Todos</option>
                    <option value="REWORK" {% if selected_disposition == 'REWORK' %}selected{% endif %}>Retrabajo</option>
                    <option value="REPAIR" {% if selected_disposition == 'REPAIR' %}selected{% endif %}>Reparación</option>
                    <option value="SCRAP" {% if selected_disposition == 'SCRAP' %}selected{% endif %}>Descarte</option>
                    <option value="CONCESSION" {% if selected_disposition == 'CONCESSION' %}selected{% endif %}>Concesión</option>
                    <option value="RETURN" {% if selected_disposition == 'RETURN' %}selected{% endif %}>Devolución</option>
                    <option value="OTHER" {% if selected_disposition == 'OTHER' %}selected{% endif %}>Otro</option>
                </select>
            </div>
            <div>
                <label for="process-filter" class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2">Proceso</label>
                <select id="process-filter" name="process_id" class="w-full rounded-lg border border-slate-300 dark:border-white/10 bg-white dark:bg-slate-900/50 px-3 py-2 text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-blue-500">
                    <option value="">Todos</option>
                    {% for process in processes %}
                    <option value="{{ process.id }}" {% if selected_process_id|add:'0' == process.id|add:'0' %}selected{% endif %}>{{ process.name }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>
    </form>

    <!-- Results -->
    <div id="results">
        {% include "core/pnc/_list_results.html" %}
    </div>
</div>
{% endblock %}
