{% extends "base.html" %}

{% block title %}Productos/Servicios No Conformes{% endblock %}

{% block extra_css %}
<style>
    .page-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: var(--spacing-xl);
    }

    .page-header h1 {
        margin: 0;
        color: var(--color-primary);
    }

    .filters {
        background: var(--color-white);
        padding: var(--spacing-lg);
        border-radius: var(--border-radius-lg);
        margin-bottom: var(--spacing-xl);
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: var(--spacing-md);
        box-shadow: var(--shadow-sm);
    }

    .filters select {
        padding: var(--spacing-sm);
        border: 1px solid var(--color-gray-300);
        border-radius: var(--border-radius-md);
        font-family: inherit;
    }

    .pnc-table {
        width: 100%;
        border-collapse: collapse;
        background: var(--color-white);
        border-radius: var(--border-radius-lg);
        overflow: hidden;
        box-shadow: var(--shadow-sm);
    }

    .pnc-table thead {
        background: var(--color-primary-light);
    }

    .pnc-table th {
        padding: var(--spacing-md);
        text-align: left;
        font-weight: 700;
        color: var(--color-primary);
        border-bottom: 2px solid var(--color-primary);
    }

    .pnc-table td {
        padding: var(--spacing-md);
        border-bottom: 1px solid var(--color-gray-200);
    }

    .pnc-table tbody tr:hover {
        background: var(--color-gray-50);
    }

    .pnc-row {
        cursor: pointer;
    }

    .pnc-row:hover {
        background: var(--color-gray-50);
    }

    .badge {
        display: inline-block;
        padding: 4px 8px;
        border-radius: var(--border-radius-sm);
        font-size: var(--font-size-xs);
        font-weight: 700;
        text-transform: uppercase;
    }

    .badge-open { background: #e3f2fd; color: #1976d2; }
    .badge-in-treatment { background: #fff3e0; color: #e65100; }
    .badge-closed { background: #c8e6c9; color: #2e7d32; }

    .badge-minor { background: #f3e5f5; color: #7b1fa2; }
    .badge-major { background: #ffe0b2; color: #e65100; }
    .badge-critical { background: #ffcdd2; color: #c62828; }

    .empty-state {
        text-align: center;
        padding: var(--spacing-xl);
        background: var(--color-white);
        border: 2px dashed var(--color-gray-300);
        border-radius: var(--border-radius-lg);
    }

    .empty-state-icon {
        font-size: 4rem;
        margin-bottom: var(--spacing-md);
    }

    @media (max-width: 768px) {
        .page-header {
            flex-direction: column;
            gap: var(--spacing-md);
        }

        .filters {
            grid-template-columns: 1fr;
        }

        .pnc-table {
            font-size: var(--font-size-sm);
        }

        .pnc-table th,
        .pnc-table td {
            padding: var(--spacing-sm);
        }
    }
</style>
{% endblock %}

{% block content %}
<div class="page-header">
    <h1>🔴 Productos/Servicios No Conformes</h1>
    {% if can_edit %}
    <a href="{% url 'core:nonconforming_output_new' %}" class="btn btn-primary">➕ Nuevo PNC</a>
    {% endif %}
</div>

<form method="get" class="filters" hx-get="{% url 'core:nonconforming_output_list' %}" hx-target="#results" hx-push-url="true" hx-trigger="change delay:300ms, submit">
    <div>
        <label for="status-filter">Estado</label>
        <select id="status-filter" name="status">
            <option value="">Todos</option>
            <option value="OPEN" {% if selected_status == 'OPEN' %}selected{% endif %}>Abierta</option>
            <option value="IN_TREATMENT" {% if selected_status == 'IN_TREATMENT' %}selected{% endif %}>En tratamiento</option>
            <option value="CLOSED" {% if selected_status == 'CLOSED' %}selected{% endif %}>Cerrada</option>
        </select>
    </div>
    <div>
        <label for="severity-filter">Severidad</label>
        <select id="severity-filter" name="severity">
            <option value="">Todos</option>
            <option value="MINOR" {% if selected_severity == 'MINOR' %}selected{% endif %}>Menor</option>
            <option value="MAJOR" {% if selected_severity == 'MAJOR' %}selected{% endif %}>Mayor</option>
            <option value="CRITICAL" {% if selected_severity == 'CRITICAL' %}selected{% endif %}>Crítica</option>
        </select>
    </div>
    <div>
        <label for="disposition-filter">Disposición</label>
        <select id="disposition-filter" name="disposition">
            <option value="">Todos</option>
            <option value="REWORK" {% if selected_disposition == 'REWORK' %}selected{% endif %}>Retrabajo</option>
            <option value="REPAIR" {% if selected_disposition == 'REPAIR' %}selected{% endif %}>Reparación</option>
            <option value="SCRAP" {% if selected_disposition == 'SCRAP' %}selected{% endif %}>Descarte</option>
            <option value="CONCESSION" {% if selected_disposition == 'CONCESSION' %}selected{% endif %}>Concesión</option>
            <option value="RETURN" {% if selected_disposition == 'RETURN' %}selected{% endif %}>Devolución</option>
            <option value="OTHER" {% if selected_disposition == 'OTHER' %}selected{% endif %}>Otro</option>
        </select>
    </div>
    <div>
        <label for="process-filter">Proceso</label>
        <select id="process-filter" name="process_id">
            <option value="">Todos</option>
            {% for process in processes %}
            <option value="{{ process.id }}" {% if selected_process_id|add:'0' == process.id|add:'0' %}selected{% endif %}>{{ process.name }}</option>
            {% endfor %}
        </select>
    </div>
</form>

<div id="results">
    {% include "core/pnc/_list_results.html" %}
</div>
{% endblock %}
