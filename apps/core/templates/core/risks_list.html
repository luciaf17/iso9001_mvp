{% extends "base.html" %}

{% block title %}Riesgos y Oportunidades{% endblock %}

{% block content %}
<div class="space-y-6">
    <!-- Header -->
    <div class="flex flex-col md:flex-row items-start md:items-center justify-between gap-4">
        <div>
            <h1 class="text-3xl font-bold text-slate-900 dark:text-white">⚠️ Riesgos y Oportunidades</h1>
            <p class="text-sm text-slate-500 dark:text-slate-400 mt-1">Organizacion: {{ organization.name }}</p>
        </div>
        <div class="flex flex-wrap gap-3">
            <a class="btn-secondary" href="{% url 'core:risk_dashboard' %}{% if request.GET %}?{{ request.GET.urlencode }}{% endif %}">📊 Dashboard</a>
            {% if can_edit %}
            <a class="btn-primary" href="{% url 'core:risk_new' %}">+ Nuevo Riesgo</a>
            {% endif %}
        </div>
    </div>

    <form method="get" class="bg-white dark:bg-slate-800/50 border border-slate-200 dark:border-white/10 rounded-xl p-6 shadow-sm" hx-get="{% url 'core:risk_list' %}" hx-target="#results" hx-push-url="true" hx-trigger="change delay:300ms, submit">
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 items-end">
            <div>
                <label for="process_type" class="block text-xs uppercase tracking-wider font-semibold text-slate-700 dark:text-slate-300 mb-2">🧭 Tipo de proceso</label>
                <select id="process_type" name="process_type" class="w-full rounded-lg border border-slate-300 dark:border-white/10 bg-white dark:bg-slate-900/50 px-3 py-2 text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-blue-500">
                    <option value="">Todos</option>
                    {% for value, label in process_types %}
                    <option value="{{ value }}" {% if selected_process_type == value %}selected{% endif %}>{{ label }}</option>
                    {% endfor %}
                </select>
            </div>
            <div>
                <label for="process_id" class="block text-xs uppercase tracking-wider font-semibold text-slate-700 dark:text-slate-300 mb-2">🔗 Proceso</label>
                <select id="process_id" name="process_id" class="w-full rounded-lg border border-slate-300 dark:border-white/10 bg-white dark:bg-slate-900/50 px-3 py-2 text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-blue-500">
                    <option value="">Todos</option>
                    {% for process in processes %}
                    <option value="{{ process.id }}" {% if selected_process_id == process.id|stringformat:"s" %}selected{% endif %}>{{ process }}</option>
                    {% endfor %}
                </select>
            </div>
            <div>
                <label for="stakeholder_id" class="block text-xs uppercase tracking-wider font-semibold text-slate-700 dark:text-slate-300 mb-2">🤝 Parte interesada</label>
                <select id="stakeholder_id" name="stakeholder_id" class="w-full rounded-lg border border-slate-300 dark:border-white/10 bg-white dark:bg-slate-900/50 px-3 py-2 text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-blue-500">
                    <option value="">Todas</option>
                    {% for stakeholder in stakeholders %}
                    <option value="{{ stakeholder.id }}" {% if selected_stakeholder_id == stakeholder.id|stringformat:"s" %}selected{% endif %}>{{ stakeholder.name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div>
                <label for="status" class="block text-xs uppercase tracking-wider font-semibold text-slate-700 dark:text-slate-300 mb-2">📌 Estado</label>
                <select id="status" name="status" class="w-full rounded-lg border border-slate-300 dark:border-white/10 bg-white dark:bg-slate-900/50 px-3 py-2 text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-blue-500">
                    <option value="">Todos</option>
                    {% for value, label in status_choices %}
                    <option value="{{ value }}" {% if selected_status == value %}selected{% endif %}>{{ label }}</option>
                    {% endfor %}
                </select>
            </div>
            <div>
                <label for="level" class="block text-xs uppercase tracking-wider font-semibold text-slate-700 dark:text-slate-300 mb-2">🎯 Nivel</label>
                <select id="level" name="level" class="w-full rounded-lg border border-slate-300 dark:border-white/10 bg-white dark:bg-slate-900/50 px-3 py-2 text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-blue-500">
                    <option value="">Todos</option>
                    {% for value, label in level_choices %}
                    <option value="{{ value }}" {% if selected_level == value %}selected{% endif %}>{{ label }}</option>
                    {% endfor %}
                </select>
            </div>
            <div>
                <label for="kind" class="block text-xs uppercase tracking-wider font-semibold text-slate-700 dark:text-slate-300 mb-2">📊 Tipo</label>
                <select id="kind" name="kind" class="w-full rounded-lg border border-slate-300 dark:border-white/10 bg-white dark:bg-slate-900/50 px-3 py-2 text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-blue-500">
                    <option value="">Todos</option>
                    {% for value, label in kind_choices %}
                    <option value="{{ value }}" {% if selected_kind == value %}selected{% endif %}>{{ label }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>
        <div class="flex justify-end mt-4 pt-4 border-t border-slate-200 dark:border-white/10">
            <a class="btn-secondary" href="{% url 'core:risk_list' %}">Limpiar</a>
        </div>
    </form>

    <div id="results">
        {% include "core/risks/_list_results.html" %}
    </div>
</div>
{% endblock %}
