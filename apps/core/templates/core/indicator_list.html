{% extends "base.html" %}

{% block title %}Indicadores de Calidad{% endblock %}

{% block content %}
<div class="space-y-6">
    <!-- Header -->
    <div class="flex items-center justify-between">
        <h1 class="text-3xl font-bold text-slate-900 dark:text-slate-100">📊 Indicadores de Calidad</h1>
        {% if can_edit %}
        <a href="{% url 'core:indicator_new' %}" class="btn-primary">➕ Nuevo Indicador</a>
        {% endif %}
    </div>

    <!-- Filters Card -->
    <form method="get" class="bg-white dark:bg-slate-800/50 border border-slate-200 dark:border-white/10 rounded-xl p-6 shadow-sm" hx-get="{% url 'core:indicator_list' %}" hx-target="#results" hx-push-url="true" hx-trigger="change delay:300ms, submit">
        <div class="flex items-end gap-4">
            <div class="flex-1">
                <label for="process-filter" class="block text-xs uppercase tracking-wider font-semibold text-slate-700 dark:text-slate-300 mb-2">Proceso</label>
                <select class="w-full rounded-lg border border-slate-300 dark:border-white/10 bg-white dark:bg-slate-900/50 px-3 py-2 text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all" id="process-filter" name="process_id">
                    <option value="">Todos</option>
                    {% for process in processes %}
                    <option value="{{ process.id }}" {% if process.id|stringformat:"s" == selected_process_id %}selected{% endif %}>{{ process.name }}</option>
                    {% endfor %}
                </select>
            </div>
            <a class="btn-secondary" href="{% url 'core:indicator_list' %}">Limpiar</a>
        </div>
    </form>

    <!-- Results -->
    <div id="results">
        {% include "core/indicators/_list_results.html" %}
    </div>
</div>
{% endblock %}
