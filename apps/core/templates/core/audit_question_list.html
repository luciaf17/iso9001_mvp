{% extends "base.html" %}

{% block title %}Preguntas de Auditoria{% endblock %}

{% block content %}
<div class="space-y-6">
    <div class="flex flex-col md:flex-row items-start md:items-center justify-between gap-4">
        <div>
            <h1 class="text-3xl font-bold text-slate-900 dark:text-white">🧠 Preguntas de Auditoría</h1>
            <p class="text-sm text-slate-500 dark:text-slate-400 mt-1">Organización: {{ organization.name }}</p>
        </div>
        <a class="btn-primary" href="{% url 'core:audit_question_new' %}">+ Nueva pregunta</a>
    </div>

    <form method="get" class="bg-white dark:bg-slate-800/50 border border-slate-200 dark:border-white/10 rounded-xl p-6 shadow-sm" hx-get="{% url 'core:audit_question_list' %}" hx-target="#results" hx-push-url="true" hx-trigger="change delay:300ms, keyup changed delay:300ms from:#search, submit">
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 items-end">
            <div>
                <label for="search" class="block text-xs uppercase tracking-wider font-semibold text-slate-700 dark:text-slate-300 mb-2">Texto</label>
                <input id="search" name="search" type="text" value="{{ selected_search }}" placeholder="Buscar pregunta..." class="w-full rounded-lg border border-slate-300 dark:border-white/10 bg-white dark:bg-slate-900/50 px-3 py-2 text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-blue-500">
            </div>
            <div>
                <label for="process_type" class="block text-xs uppercase tracking-wider font-semibold text-slate-700 dark:text-slate-300 mb-2">Tipo de proceso</label>
                <select id="process_type" name="process_type" class="w-full rounded-lg border border-slate-300 dark:border-white/10 bg-white dark:bg-slate-900/50 px-3 py-2 text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-blue-500">
                    <option value="">Todos</option>
                    {% for value, label in process_types %}
                    <option value="{{ value }}" {% if selected_process_type == value %}selected{% endif %}>{{ label }}</option>
                    {% endfor %}
                </select>
            </div>
            <div>
                <label for="is_active" class="block text-xs uppercase tracking-wider font-semibold text-slate-700 dark:text-slate-300 mb-2">Estado</label>
                <select id="is_active" name="is_active" class="w-full rounded-lg border border-slate-300 dark:border-white/10 bg-white dark:bg-slate-900/50 px-3 py-2 text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-blue-500">
                    <option value="">Todos</option>
                    <option value="true" {% if selected_is_active == "true" %}selected{% endif %}>Activa</option>
                    <option value="false" {% if selected_is_active == "false" %}selected{% endif %}>Inactiva</option>
                </select>
            </div>
        </div>
        <div class="flex justify-end mt-4 pt-4 border-t border-slate-200 dark:border-white/10">
            <a class="btn-secondary" href="{% url 'core:audit_question_list' %}">Limpiar</a>
        </div>
    </form>

    <div id="results">
        {% include "core/audit_questions/_list_results.html" %}
    </div>
</div>
{% endblock %}
