{% extends "base.html" %}

{% block title %}No Conformidades{% endblock %}

{% block content %}
<div class="space-y-6">
    <!-- Header -->
    <div class="flex items-center justify-between">
        <div>
            <h1 class="text-3xl font-bold text-slate-900 dark:text-slate-100">🚨 No Conformidades</h1>
            <p class="text-sm text-slate-500 dark:text-slate-400 mt-1">Organización: {{ organization.name }}</p>
        </div>
        <div class="flex gap-3">
            {% if can_edit %}
            <a class="btn btn-success" href="{% url 'core:nc_new' %}">+ Nueva</a>
            {% endif %}
        </div>
    </div>

    <!-- Filters Card -->
    <form method="get" class="bg-white dark:bg-slate-800/50 border border-slate-200 dark:border-white/10 rounded-xl p-6 shadow-sm" hx-get="{% url 'core:nc_list' %}" hx-target="#results" hx-push-url="true" hx-trigger="change delay:300ms, submit">
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 items-end">
            <div>
                <label for="origin" class="block text-xs uppercase tracking-wider font-semibold text-slate-700 dark:text-slate-300 mb-2">📍 Origen</label>
                <select id="origin" name="origin" class="w-full rounded-lg border border-slate-300 dark:border-white/10 bg-white dark:bg-slate-900/50 px-3 py-2 text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all">
                    <option value="">Todos</option>
                    {% for value, label in origin_choices %}
                    <option value="{{ value }}" {% if selected_origin == value %}selected{% endif %}>{{ label }}</option>
                    {% endfor %}
                </select>
            </div>
            <div>
                <label for="severity" class="block text-xs uppercase tracking-wider font-semibold text-slate-700 dark:text-slate-300 mb-2">⚠️ Severidad</label>
                <select id="severity" name="severity" class="w-full rounded-lg border border-slate-300 dark:border-white/10 bg-white dark:bg-slate-900/50 px-3 py-2 text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all">
                    <option value="">Todas</option>
                    {% for value, label in severity_choices %}
                    <option value="{{ value }}" {% if selected_severity == value %}selected{% endif %}>{{ label }}</option>
                    {% endfor %}
                </select>
            </div>
            <div>
                <label for="status" class="block text-xs uppercase tracking-wider font-semibold text-slate-700 dark:text-slate-300 mb-2">📌 Estado</label>
                <select id="status" name="status" class="w-full rounded-lg border border-slate-300 dark:border-white/10 bg-white dark:bg-slate-900/50 px-3 py-2 text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all">
                    <option value="">Todos</option>
                    {% for value, label in status_choices %}
                    <option value="{{ value }}" {% if selected_status == value %}selected{% endif %}>{{ label }}</option>
                    {% endfor %}
                </select>
            </div>
            <div>
                <label for="process_id" class="block text-xs uppercase tracking-wider font-semibold text-slate-700 dark:text-slate-300 mb-2">🔗 Proceso</label>
                <select id="process_id" name="process_id" class="w-full rounded-lg border border-slate-300 dark:border-white/10 bg-white dark:bg-slate-900/50 px-3 py-2 text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all">
                    <option value="">Todos</option>
                    {% for process in processes %}
                    <option value="{{ process.id }}" {% if selected_process_id == process.id|stringformat:"s" %}selected{% endif %}>{{ process }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>
        <div class="flex justify-end gap-3 mt-4 pt-4 border-t border-slate-200 dark:border-white/10">
            <a class="btn-secondary btn-small" href="{% url 'core:nc_list' %}">Limpiar</a>
        </div>
    </form>

    <!-- Results -->
    <div id="results">
        {% include "core/nc/_list_results.html" %}
    </div>
</div>
{% endblock %}
