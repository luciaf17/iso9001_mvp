{% extends "base.html" %}

{% block title %}Documentos - ISO 9001 MVP{% endblock %}

{% block content %}
<div class="mb-6 flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between">
    <h1 class="text-2xl font-semibold tracking-tight text-slate-900 dark:text-white">📄 Documentos del SGC</h1>
    {% if user.is_authenticated and can_create %}<a href="{% url 'docs:docs_new' %}" class="btn btn-primary">+ Nuevo Documento</a>{% endif %}
</div>

<div class="mb-6 rounded-xl border border-slate-200 bg-white p-5 shadow-sm dark:border-slate-700 dark:bg-slate-900">
    <form method="get" class="grid grid-cols-1 gap-4 md:grid-cols-2 lg:grid-cols-3" hx-get="{% url 'docs:docs_list' %}" hx-target="#results" hx-push-url="true" hx-trigger="change delay:300ms, keyup changed delay:300ms from:#doc_type, keyup changed delay:300ms from:#process_id">
        <div>
            <label for="doc_type" class="mb-1 block text-sm font-medium text-slate-700 dark:text-slate-300">📋 Tipo de Documento</label>
            <select name="doc_type" id="doc_type">
                <option value="">Todos</option>
                {% for value, label in doc_types %}
                <option value="{{ value }}" {% if selected_doc_type == value %}selected{% endif %}>{{ label }}</option>
                {% endfor %}
            </select>
        </div>
        <div>
            <label for="process_id" class="mb-1 block text-sm font-medium text-slate-700 dark:text-slate-300">🔗 Procesos</label>
            <select name="process_id" id="process_id">
                <option value="">Todos</option>
                {% for process in processes %}
                <option value="{{ process.id }}" {% if selected_process_id == process.id|stringformat:"s" %}selected{% endif %}>{{ process.code }} - {{ process.name }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="flex items-end">
            <a class="btn btn-secondary w-full justify-center text-center" href="{% url 'docs:docs_list' %}">Limpiar</a>
        </div>
    </form>
</div>

<div id="results">
    {% include "docs/partials/document_list_results.html" %}
</div>
{% endblock %}
