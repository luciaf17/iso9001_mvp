{% extends "base.html" %}
{% load static %}

{% block title %}Biblioteca de Documentos{% endblock %}

{% block content %}
<div class="mb-6">
    <h1 class="text-2xl font-semibold tracking-tight text-slate-900 dark:text-white">📚 Biblioteca de Documentos</h1>
    <p class="mt-1 text-sm text-slate-500 dark:text-slate-400">Documentos vigentes organizados por procesos</p>
</div>

<div class="mb-6 rounded-xl border border-slate-200 bg-white p-5 shadow-sm dark:border-slate-700 dark:bg-slate-900">
    <h3 class="mb-4 text-base font-semibold text-slate-900 dark:text-white">🔍 Filtros</h3>
    <form method="get" hx-get="{% url 'docs:docs_library' %}" hx-target="#results" hx-push-url="true" hx-trigger="change delay:300ms, submit">
        <div class="grid grid-cols-1 gap-4 md:grid-cols-2 lg:grid-cols-3">
            <div>
                <label for="site_id" class="mb-1 block text-sm font-medium text-slate-700 dark:text-slate-300">Sede</label>
                <select id="site_id" name="site_id">
                    <option value="">Todas las sedes</option>
                    {% for site_id, site_name in sites %}
                        <option value="{{ site_id }}" {% if site_id|stringformat:'s' == selected_site_id %}selected{% endif %}>
                            {{ site_name }}
                        </option>
                    {% endfor %}
                </select>
            </div>
            
            <div>
                <label for="process_type" class="mb-1 block text-sm font-medium text-slate-700 dark:text-slate-300">Tipo de Proceso</label>
                <select id="process_type" name="process_type">
                    <option value="">Todos los tipos</option>
                    {% for value, label in process_types %}
                        <option value="{{ value }}" {% if value == selected_process_type %}selected{% endif %}>
                            {{ label }}
                        </option>
                    {% endfor %}
                </select>
            </div>
            
            <div>
                <label for="doc_type" class="mb-1 block text-sm font-medium text-slate-700 dark:text-slate-300">Tipo de Documento</label>
                <select id="doc_type" name="doc_type">
                    <option value="">Todos los tipos</option>
                    {% for value, label in doc_types %}
                        <option value="{{ value }}" {% if value == selected_doc_type %}selected{% endif %}>
                            {{ label }}
                        </option>
                    {% endfor %}
                </select>
            </div>
        </div>
        
        <div class="mt-4 flex gap-3 border-t border-slate-200 pt-4 dark:border-slate-700">
            <a href="{% url 'docs:docs_library' %}" class="btn btn-secondary">
                ↺ Limpiar
            </a>
        </div>
    </form>
</div>

<div id="results">
    {% include "docs/partials/docs_library_results.html" %}
</div>
{% endblock %}
