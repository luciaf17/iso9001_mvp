{% extends "base.html" %}
{% load org_tags %}

{% block title %}Mapa de Procesos{% endblock %}

{% block extra_css %}
<style>
    .map-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: var(--spacing-xl);
    }
    
    .map-header h1 {
        font-size: var(--font-size-3xl);
        color: var(--color-primary);
    }
    
    .filter-card {
        background: var(--color-white);
        border: 2px solid var(--color-primary-light);
        border-radius: var(--border-radius-lg);
        padding: var(--spacing-lg);
        margin-bottom: var(--spacing-xl);
        box-shadow: var(--shadow-sm);
    }
    
    .filters {
        display: flex;
        flex-wrap: wrap;
        gap: var(--spacing-lg);
        align-items: flex-end;
    }
    
    .filters label {
        display: flex;
        flex-direction: column;
        font-weight: 600;
        gap: var(--spacing-sm);
    }
    
    .filters select {
        padding: var(--spacing-sm) var(--spacing-md);
        border: 2px solid var(--color-gray-300);
        border-radius: var(--border-radius-md);
        transition: var(--transition);
    }
    
    .filters select:focus {
        outline: none;
        border-color: var(--color-primary);
        box-shadow: 0 0 0 3px var(--color-primary-light);
    }

    .process-tree {
        list-style: none;
        margin: 0;
        padding-left: 0;
    }

    .process {
        margin: var(--spacing-md) 0;
    }

    .process-line {
        padding: var(--spacing-md) var(--spacing-lg);
        border-left: 4px solid var(--color-primary);
        background: linear-gradient(135deg, var(--color-primary-light) 0%, var(--color-white) 100%);
        border-radius: var(--border-radius-md);
        transition: var(--transition);
    }
    
    .process-line:hover {
        box-shadow: var(--shadow-md);
        transform: translateX(4px);
    }

    .process .process-tree {
        margin-left: var(--spacing-2xl);
        padding-left: var(--spacing-lg);
        border-left: 2px dashed var(--color-primary-light);
    }

    .process.level-1 > .process-line {
        border-left-color: var(--color-primary);
        background: linear-gradient(135deg, var(--color-primary-light) 0%, var(--color-white) 100%);
    }

    .process.level-2 > .process-line {
        border-left-color: var(--color-info);
        background: linear-gradient(135deg, var(--color-info-light) 0%, var(--color-white) 100%);
    }

    .process.level-3 > .process-line {
        border-left-color: var(--color-success);
        background: linear-gradient(135deg, var(--color-success-light) 0%, var(--color-white) 100%);
    }

    .process .code {
        font-weight: 700;
        color: var(--color-primary);
        font-family: var(--font-mono);
    }

    .process .type {
        color: var(--color-gray-700);
        margin-left: var(--spacing-sm);
        font-size: var(--font-size-sm);
    }

    .process .tag {
        display: inline-block;
        margin-left: var(--spacing-sm);
        padding: var(--spacing-xs) var(--spacing-sm);
        border: 1px solid var(--color-warning);
        border-radius: var(--border-radius-xl);
        font-size: var(--font-size-xs);
        color: var(--color-warning);
        background: var(--color-warning-light);
        font-weight: 600;
    }

    .process-actions {
        margin-left: var(--spacing-md);
        display: inline-flex;
        gap: var(--spacing-sm);
    }

    .action-link {
        font-size: var(--font-size-sm);
        text-decoration: none;
        padding: var(--spacing-xs) var(--spacing-sm);
        border-radius: var(--border-radius-sm);
        border: 2px solid var(--color-primary);
        color: var(--color-primary);
        background: var(--color-white);
        transition: var(--transition);
        font-weight: 600;
    }

    .action-link:hover {
        background: var(--color-primary);
        color: var(--color-white);
    }

    .action-form {
        display: inline;
    }

    .action-button {
        font-size: var(--font-size-sm);
        padding: var(--spacing-xs) var(--spacing-sm);
        border-radius: var(--border-radius-sm);
        border: 2px solid var(--color-danger);
        background: var(--color-white);
        color: var(--color-danger);
        cursor: pointer;
        font-weight: 600;
        transition: var(--transition);
    }

    .action-button:hover {
        background: var(--color-danger);
        color: var(--color-white);
    }

    .empty {
        padding: var(--spacing-2xl);
        background: var(--color-gray-50);
        border-radius: var(--border-radius-lg);
        color: var(--color-gray-600);
        text-align: center;
        border: 2px dashed var(--color-gray-300);
    }
</style>
{% endblock %}

{% block content %}
<div class="map-header">
    <h1>🗠️ Mapa de Procesos</h1>
    {% if can_edit %}
    <a href="{% url 'org:process_new' %}" class="btn btn-primary">+ Nuevo Proceso</a>
    {% endif %}
</div>

<div class="filter-card">
    <form method="get" class="filters" hx-get="{% url 'org:process_map' %}" hx-target="#results" hx-push-url="true" hx-trigger="change delay:300ms, submit">
        <label>
            🏢 Sede
            <select name="site_id">
                <option value="">Todas</option>
                {% for site in sites %}
                <option value="{{ site.id }}"{% if selected_site_id == site.id|stringformat:"s" %} selected{% endif %}>
                    {{ site.name }}
                </option>
                {% endfor %}
            </select>
        </label>

        <label>
            📋 Tipo de Proceso
            <select name="process_type">
                <option value="">Todos</option>
                {% for value, label in types %}
                <option value="{{ value }}"{% if selected_type == value %} selected{% endif %}>
                    {{ label }}
                </option>
                {% endfor %}
            </select>
        </label>
    </form>
</div>

<div id="results">
    {% include "org/partials/process_map_results.html" %}
</div>
{% endblock %}
