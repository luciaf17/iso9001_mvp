{% extends "base.html" %}
{% load org_tags %}

{% block title %}Mapa de Procesos{% endblock %}

{% block content %}
<div class="mb-6 flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between">
    <h1 class="text-2xl font-semibold tracking-tight text-slate-900 dark:text-white">🗺️ Mapa de Procesos</h1>
    {% if can_edit %}
    <a href="{% url 'org:process_new' %}" class="btn btn-primary">+ Nuevo Proceso</a>
    {% endif %}
</div>

<div class="mb-6 rounded-xl border border-slate-200 bg-white p-5 shadow-sm dark:border-slate-700 dark:bg-slate-900">
    <form method="get" class="grid grid-cols-1 gap-4 md:grid-cols-2" hx-get="{% url 'org:process_map' %}" hx-target="#results" hx-push-url="true" hx-trigger="change delay:300ms, submit">
        <label class="text-sm font-medium text-slate-700 dark:text-slate-300">
            🏢 Sede
            <select name="site_id">
                <option value="">Todas</option>
                {% for site in sites %}
                <option value="{{ site.id }}"{% if selected_site_id == site.id|stringformat:"s" %} selected{% endif %}>
                    {{ site.name }}
                </option>
                {% endfor %}
            </select>
        </label>

        <label class="text-sm font-medium text-slate-700 dark:text-slate-300">
            📋 Tipo de Proceso
            <select name="process_type">
                <option value="">Todos</option>
                {% for value, label in types %}
                <option value="{{ value }}"{% if selected_type == value %} selected{% endif %}>
                    {{ label }}
                </option>
                {% endfor %}
            </select>
        </label>
    </form>
</div>

<div id="results">
    {% include "org/partials/process_map_results.html" %}
</div>
{% endblock %}
