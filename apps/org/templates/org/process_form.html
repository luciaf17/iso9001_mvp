{% extends "base.html" %}

{% block title %}{{ title }}{% endblock %}

{% block extra_css %}
<style>
    .form-card { max-width: 720px; background: #ffffff; border: 1px solid #e2e6ea; border-radius: 8px; padding: 1.5rem; }
    .form-card h1 { margin-bottom: 1rem; }
    .form-errors { background: #f8d7da; border: 1px solid #f5c6cb; color: #721c24; padding: 0.75rem 1rem; border-radius: 6px; margin-bottom: 1rem; }
    .form-actions { display: flex; gap: 0.75rem; margin-top: 1rem; }
    .btn { display: inline-block; padding: 0.5rem 1rem; border-radius: 4px; text-decoration: none; border: 1px solid transparent; cursor: pointer; font-weight: 600; }
    .btn-primary { background: #2c3e50; color: #fff; border-color: #2c3e50; }
    .btn-secondary { background: #e9ecef; color: #2c3e50; border-color: #d9dee3; }
</style>
{% endblock %}

{% block content %}
<div class="form-card">
    <h1>{{ title }}</h1>

    {% if form.errors %}
    <div class="form-errors">
        <strong>Revisar los errores del formulario.</strong>
        {{ form.non_field_errors }}
    </div>
    {% endif %}

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}

        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Guardar</button>
            <a class="btn btn-secondary" href="{% url 'org:process_map' %}">Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}
