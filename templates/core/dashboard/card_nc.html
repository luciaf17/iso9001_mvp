<div class="card-header">
  <h3 class="card-title">
    <svg class="card-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="12" cy="12" r="10"></circle>
      <line x1="12" y1="8" x2="12" y2="16"></line>
      <line x1="8" y1="12" x2="16" y2="12"></line>
    </svg>
    No Conformidades
  </h3>
  <span class="badge badge-counter badge-danger">{{ count }}</span>
</div>

<div class="card-body">
  {% if ncs %}
    <ul class="card-list">
      {% for nc in ncs %}
        <li class="card-list-item">
          <a href="{% url 'core:nc_detail' nc.id %}" class="card-link">
            <strong>{{ nc.code }}</strong>: {{ nc.title|truncatewords:8 }}
          </a>
          <div class="card-meta">
            <span class="badge badge-{{ nc.severity|lower }}">{{ nc.get_severity_display }}</span>
            <span class="status-badge status-{{ nc.status|lower }}">{{ nc.get_status_display }}</span>
          </div>
        </li>
      {% endfor %}
    </ul>
  {% else %}
    <p class="empty-state">No hay no conformidades abiertas</p>
  {% endif %}
</div>

<div class="card-footer">
  <a href="{% url 'core:nc_list' %}" class="card-footer-link">Ver todas</a>
</div>

<style>
  .card-header {
    padding: var(--spacing-md);
    border-bottom: 1px solid var(--color-border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .card-title {
    margin: 0;
    font-size: 1.1rem;
    display: flex;
    gap: var(--spacing-sm);
    align-items: center;
    color: var(--color-text-primary);
  }

  .card-icon {
    width: 24px;
    height: 24px;
    flex-shrink: 0;
    color: var(--color-danger);
  }

  .card-body {
    padding: var(--spacing-md);
  }

  .card-list {
    list-style: none;
    margin: 0;
    padding: 0;
    display: flex;
    flex-direction: column;
    gap: var(--spacing-sm);
  }

  .card-list-item {
    padding: var(--spacing-sm);
    border: 1px solid var(--color-border-light);
    border-radius: var(--border-radius-sm);
    display: flex;
    flex-direction: column;
    gap: var(--spacing-xs);
  }

  .card-link {
    color: var(--color-primary);
    text-decoration: none;
    font-weight: 500;
    transition: color 0.2s;
  }

  .card-link:hover {
    color: var(--color-primary-dark);
    text-decoration: underline;
  }

  .card-meta {
    display: flex;
    gap: var(--spacing-xs);
    flex-wrap: wrap;
  }

  .badge {
    display: inline-block;
    padding: 0.25rem 0.5rem;
    border-radius: var(--border-radius-sm);
    font-size: 0.8rem;
    font-weight: 600;
  }

  .badge-counter {
    padding: 0.5rem 0.75rem;
    font-size: 0.9rem;
    border-radius: calc(var(--border-radius-sm) + 4px);
  }

  .badge-danger {
    background: #fee2e2;
    color: #991b1b;
  }

  .badge-critical {
    background: #fecaca;
    color: #7f1d1d;
  }

  .badge-major {
    background: #fed7aa;
    color: #92400e;
  }

  .badge-minor {
    background: #fef08a;
    color: #713f12;
  }

  .status-badge {
    padding: 0.25rem 0.5rem;
    border-radius: var(--border-radius-sm);
    font-size: 0.75rem;
    font-weight: 600;
  }

  .status-open {
    background: #fee2e2;
    color: #991b1b;
  }

  .status-in_analysis {
    background: #fef3c7;
    color: #92400e;
  }

  .status-in_treatment {
    background: #dbeafe;
    color: #0c4a6e;
  }

  .status-verification {
    background: #d1fae5;
    color: #065f46;
  }

  .status-closed {
    background: #e0e7ff;
    color: #312e81;
  }

  .empty-state {
    text-align: center;
    color: var(--color-text-secondary);
    padding: var(--spacing-md) 0;
    margin: 0;
  }

  .card-footer {
    padding: var(--spacing-sm) var(--spacing-md);
    border-top: 1px solid var(--color-border);
    text-align: center;
  }

  .card-footer-link {
    color: var(--color-primary);
    text-decoration: none;
    font-weight: 600;
    font-size: 0.9rem;
    transition: color 0.2s;
  }

  .card-footer-link:hover {
    color: var(--color-primary-dark);
    text-decoration: underline;
  }
</style>
